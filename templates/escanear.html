{% extends "base.html" %}
{% block title %}Escanear Pedido{% endblock %}
{% block content %}
<main>
  <div class="card mb-4">
    <div class="card-body">
      <h2>Escanear Pedido</h2>

      <div id="reader" style="width:100%; max-width:400px; height:300px; margin:1rem auto;"></div>
      <button id="stop-btn" class="btn btn-primary" style="display:block; margin:0 auto;">
        Detener escaneo
      </button>
      <hr style="margin:2rem 0;">

      <p><strong>O subí una imagen de QR:</strong></p>
      <input type="file" id="input-escanear" accept="image/*" class="mt-1"><br><br>

      <p><strong>O ingresá el ID manualmente:</strong></p>
      <div style="display:flex; align-items:center;">
        <input
          type="text"
          id="manual-id"
          placeholder="Ingresar ID de pedido"
          style="flex:1; padding:0.5rem; border:1px solid #ccc; border-radius:4px;"
        >
        <button class="btn btn-primary" id="btn-manual" style="margin-left:1rem;">
          Buscar
        </button>
      </div>
    </div>
  </div>

  <div id="detalle-pedido" class="card" style="display:none; margin-top:2rem;">
    <div class="card-body">
      <h3>Detalle del Pedido</h3>
      <p><strong>Cliente:</strong> <span id="cliente"></span></p>
      <table style="width:100%; border-collapse:collapse;">
        <thead>
          <tr>
            <th style="text-align:left; padding:0.5rem; border-bottom:1px solid #ccc;">Imagen</th>
            <th style="text-align:left; padding:0.5rem; border-bottom:1px solid #ccc;">Título</th>
            <th style="text-align:left; padding:0.5rem; border-bottom:1px solid #ccc;">SKU</th>
            <th style="text-align:left; padding:0.5rem; border-bottom:1px solid #ccc;">Variante</th>
            <th style="text-align:left; padding:0.5rem; border-bottom:1px solid #ccc;">Cantidad</th>
          </tr>
        </thead>
        <tbody id="tabla-items"></tbody>
      </table>

      <div style="text-align:center; margin-top:1rem;">
        <button id="boton-armar" class="btn btn-primary" style="display:none; width:100%;">
          Marcar como armado
        </button>
      </div>
      <div id="message-armar" class="mt-2"></div>
    </div>
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="/static/html5-qrcode.min.js"></script>
<script>
  let scanner;
  let ultimoShipId = "";

  async function iniciarEscaneo() {
    if (!navigator.mediaDevices?.getUserMedia) return console.error('getUserMedia no soportado');

    let source;
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoInputs = devices.filter(d=>d.kind==='videoinput');
      const back = videoInputs.find(d=>/back|rear|environment/i.test(d.label));
      source = back ? { deviceId:{ exact: back.deviceId } } : { facingMode:'environment' };
    } catch {
      source = { facingMode:'environment' };
    }

    const constraints = { video:{ ...source, width:{ ideal:640 }, height:{ ideal:480 } } };

    scanner = new Html5Qrcode('reader');
    scanner.start(
      constraints,
      { fps:10, qrbox:250, rememberLastUsedCamera:true },
      decoded => {
        scanner.stop().catch(()=>{});
        escanear(decoded);
      },
      ()=>{}
    )
    .then(()=>console.log('Cámara iniciada'))
    .catch(err=>{
      console.error('No arrancó cámara:', err.name, err.message);
      if(err.name==='OverconstrainedError') iniciarEscaneo();
      if(err.name==='NotAllowedError') alert('Permiso denegado. Activa cámara en ajustes.');
    });
  }

  window.addEventListener('DOMContentLoaded',()=>{
    iniciarEscaneo();

    document.getElementById('stop-btn').addEventListener('click',()=>{
      if(scanner?._isScanning){
        scanner.stop().then(()=>document.getElementById('stop-btn').innerText='Reanudar escaneo');
      } else {
        iniciarEscaneo();
        document.getElementById('stop-btn').innerText='Detener escaneo';
      }
    });

    document.getElementById('input-escanear').addEventListener('change',e=>{
      if(!e.target.files.length) return;
      const imgScanner = new Html5Qrcode('reader');
      imgScanner.scanFile(e.target.files[0],true)
        .then(decoded=>{ imgScanner.clear(); escanear(decoded); })
        .catch(()=>alert('No se pudo leer el QR.'));
    });

    document.getElementById('btn-manual').addEventListener('click',()=>{
      const id=document.getElementById('manual-id').value.trim();
      if(id) escanear(id);
    });

    document.getElementById('boton-armar').addEventListener('click',()=>{
      if(!ultimoShipId) return alert('No hay shipment_id válido.');
      const f=new FormData(); f.append('shipment_id',ultimoShipId);
      fetch('/armar',{ method:'POST', body:f, credentials:'include' })
        .then(r=>r.json())
        .then(r=>{ if(r.success) window.location.reload(); else alert(r.error); })
        .catch(()=>alert('Error al marcar armado'));
    });
  });

  async function escanear(raw){
    const { order_id, shipment_id } = parseQr(raw);
    ultimoShipId = shipment_id || '';
    if(!shipment_id) return alert('QR sin shipment_id válido.');
    const f=new FormData(); f.append('shipment_id',shipment_id);
    try {
      const r=await fetch('/escanear',{ method:'POST', body:f, credentials:'include' });
      if(!r.ok) return alert('('+r.status+') '+await r.text());
      const d=await r.json();
      document.getElementById('cliente').innerText=d.detalle.cliente;
      const t=document.getElementById('tabla-items'); t.innerHTML='';
      d.detalle.items.forEach(item=>{
        const img=(item.imagenes?.[0]?.thumbnail)||'https://via.placeholder.com/150';
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td style="text-align:center;padding:0.5rem;border-bottom:1px solid #eee;">
            <img src="${img}" width="80" style="border-radius:4px;">
          </td>
          <td style="padding:0.5rem;border-bottom:1px solid #eee;">${item.titulo}</td>
          <td style="padding:0.5rem;border-bottom:1px solid #eee;">${item.sku||''}</td>
          <td style="padding:0.5rem;border-bottom:1px solid #eee;">${item.variante||''}</td>
          <td style="padding:0.5rem;border-bottom:1px solid #eee;">${item.cantidad}</td>`;
        t.appendChild(tr);
      });
      document.getElementById('detalle-pedido').style.display='block';
      document.getElementById('boton-armar').style.display='inline-block';
    } catch {
      alert('Error al obtener detalles del pedido.');
    }
  }

  function parseQr(s){
    let order_id=null, shipment_id=null;
    if(s.trim().startsWith('{')){
      try{ const p=JSON.parse(s); if(p.id) return { order_id:null, shipment_id:p.id }; }catch{}
    }
    try{
      const u=new URL(s);
      const p=u.pathname.split('/').filter(x=>x);
      if(p[0]==='shipments') shipment_id=p[1]||null;
      if(p[0]==='orders') order_id=p[1]||null;
      return { order_id, shipment_id };
    }catch{}
    return { order_id:s.trim(), shipment_id:null };
  }
</script>
{% endblock %}
