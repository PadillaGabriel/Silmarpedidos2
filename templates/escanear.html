{% extends "base.html" %}
{% block title %}Escanear Pedido{% endblock %}
{% block content %}
<main>
  <div class="card mb-4">
    <div class="card-body">
      <h2>Escanear Pedido</h2>

      <div id="reader" style="width:100%; max-width:400px; height:300px; margin:1rem auto;"></div>
      <button id="scan-btn" class="btn btn-success" style="display:block; margin:1rem auto;">
        Escanear QR
      </button>
      <button id="stop-btn" class="btn btn-secondary" style="display:block; margin:0.5rem auto;">
        Detener cámara
      </button>
      <div id="error-msg" style="color:crimson; text-align:center; margin-top:1rem;"></div>

      <hr style="margin:2rem 0;">

      <p><strong>O subí una imagen de QR:</strong></p>
      <input type="file" id="input-escanear" accept="image/*" class="mt-1"><br><br>

      <p><strong>O ingresá el ID manualmente:</strong></p>
      <div style="display:flex; align-items:center;">
        <input type="text" id="manual-id" placeholder="Ingresar ID de pedido"
               style="flex:1; padding:0.5rem; border:1px solid #ccc; border-radius:4px;">
        <button class="btn btn-primary" id="btn-manual" style="margin-left:1rem;">
          Buscar
        </button>
      </div>
    </div>
  </div>

  <!-- Detalle pedido como antes -->
  <div id="detalle-pedido" class="card" style="display:none; margin-top:2rem;">
    <!-- ... -->
  </div>
</main>
{% endblock %}
{% block scripts %}
<script src="/static/scanner.js"></script>

{% endblock %}
